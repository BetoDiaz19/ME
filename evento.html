<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg shadow-sm mb-4">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center fw-bold text-primary" href="index.html">
      <img src="logo.png" alt="Logo" width="30" height="30" class="me-2">
      Magic Exchange
    </a>
  </div>
</nav>

<div class="container" style="max-width: 500px;"> <h1>Crear Evento</h1>

    <input type="text" id="organizador" placeholder="Nombre del organizador" class="form-control mb-3">

    <label class="mb-3">
        <input type="checkbox" id="participa"> ¿Participa el organizador?
    </label>

    <h3>Celebración</h3>
    <div class="d-flex justify-content-center gap-2 mb-2">
        <button class="btn-opcion" onclick="setCelebracion('Cumpleaños')">Cumpleaños</button>
        <button class="btn-opcion" onclick="setCelebracion('Navidad')">Navidad</button>
        <button class="btn-opcion" onclick="setCelebracion('Boda')">Boda</button>
    </div>
    <input type="text" id="celebracion" placeholder="Otra celebración">

    <h3>Presupuesto</h3>
    <div class="d-flex justify-content-center gap-2 mb-2">
        <button class="btn-opcion" onclick="setPresupuesto(20)">$20</button>
        <button class="btn-opcion" onclick="setPresupuesto(50)">$50</button>
        <button class="btn-opcion" onclick="setPresupuesto(100)">$100</button>
    </div>
    <input type="number" id="presupuesto" placeholder="Otro presupuesto">

    <h3>Fecha</h3>
    <input type="date" id="fecha">

    <button onclick="guardarEvento()" class="btn-principal mt-4">Guardar y continuar</button>
</div>

<script src="js/app.js"></script>
</body>
</html>
